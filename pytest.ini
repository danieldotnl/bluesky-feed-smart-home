[pytest]
# Pytest configuration for bluesky-feed-smart-home

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    integration: Integration tests that call the real API (may be slow, require credentials)
    unit: Fast unit tests with mocks (default)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test paths
testpaths = tests

# Coverage options (if pytest-cov is installed)
# addopts = --cov=src --cov-report=term-missing --cov-report=html
